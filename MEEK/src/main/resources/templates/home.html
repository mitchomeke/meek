<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MEEK - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-8 font-sans">

<div class="max-w-3xl mx-auto space-y-6">

    <!-- Welcome Header displaying their specific username -->
    <div class="bg-slate-800 p-6 rounded-lg border border-slate-700 flex justify-between items-center">
        <div>
            <h1 class="text-3xl font-bold text-emerald-400">
                Welcome back, <span th:text="${user.userName}">Username</span>!
            </h1>
            <p class="text-slate-400 text-sm mt-1">Here is what's happening in your network.</p>
        </div>

        <!-- Logout Link -->
        <form th:action="@{/logout}" method="post">
            <button type="submit" class="px-4 py-2 bg-red-500/20 text-red-300 hover:bg-red-500/30 rounded border border-red-500/50 text-sm">
                Sign Out
            </button>
        </form>
    </div>

    <!-- Friends List Section -->
    <div class="bg-slate-800 p-6 rounded-lg border border-slate-700">
        <h2 class="text-xl font-semibold text-slate-200 mb-4">Your Friends</h2>

        <!-- If the user has friends, list them out -->
        <ul th:if="${friends != null and !friends.isEmpty()}" class="space-y-3">
            <li th:each="friend : ${friends}" class="flex items-center p-3 bg-slate-700/50 rounded border border-slate-600/50">
                <div class="w-10 h-10 rounded-full bg-emerald-500/20 text-emerald-400 flex items-center justify-center font-bold mr-3">
                    <!-- Shows first letter of friend's name -->
                    <span th:text="${#strings.substring(friend.getUserName(), 0, 1).toUpperCase()}">F</span>
                </div>
                <div>
                    <p class="font-medium text-slate-200" th:text="${friend.getUserName()}">Friend Name</p>
                </div>
            </li>
        </ul>

        <!-- Empty State: If the user has no friends yet -->
        <div th:if="${friends == null or friends.isEmpty()}" class="text-slate-400 italic text-sm py-2">
            You haven't added any friends yet.
        </div>
    </div>

</div>

</body>
</html>
