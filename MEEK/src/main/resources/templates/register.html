<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MEEK - Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

<div class="bg-slate-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-slate-700">
    <h2 class="text-2xl font-bold text-center text-emerald-400 mb-6">Create New Account</h2>

    <form th:action="@{/register}" method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1 text-slate-300">Choose Username</label>
            <input type="text" name="username" required
                   class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded focus:outline-none focus:border-emerald-400">
        </div>

        <div>
            <label class="block text-sm font-medium mb-1 text-slate-300">Choose Password</label>
            <input type="password" name="password" required
                   class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded focus:outline-none focus:border-emerald-400">
        </div>

        <button type="submit"
                class="w-full py-2 bg-emerald-500 hover:bg-emerald-600 font-semibold rounded transition duration-200">
            Sign Up
        </button>
    </form>

    <p class="text-center text-sm text-slate-400 mt-4">
        Already have an account? <a th:href="@{/login}" class="text-emerald-400 hover:underline">Log In</a>
    </p>
</div>

</body>
</html>
