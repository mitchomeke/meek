<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>MEEK - Log In</title>
    <!-- Modern styling via Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white flex items-center justify-center min-h-screen">

<div class="bg-slate-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-slate-700">
    <h2 class="text-2xl font-bold text-center text-emerald-400 mb-6">Log in to MEEK</h2>



    <!-- Display error message if login failed -->
    <div th:if="${param.error}" class="bg-red-500/20 border border-red-500 text-red-200 p-3 rounded mb-4 text-sm text-center">
        Invalid username or password.
    </div>

    <!-- Display message if user logged out -->
    <div th:if="${param.logout}" class="bg-blue-500/20 border border-blue-500 text-blue-200 p-3 rounded mb-4 text-sm text-center">
        You have been logged out.
    </div>

    <!-- Shows up when redirected from registration: /login?registered -->
    <div th:if="${param.registered}" class="bg-emerald-500/20 border border-emerald-500 text-emerald-200 p-3 rounded mb-4 text-sm text-center">
        Account created successfully!.
    </div>

    <form th:action="@{/login}" method="post" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1 text-slate-300">Username</label>
            <input type="text" name="username" required
                   class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded focus:outline-none focus:border-emerald-400">
        </div>

        <div>
            <label class="block text-sm font-medium mb-1 text-slate-300">Password</label>
            <input type="password" name="password" required
                   class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded focus:outline-none focus:border-emerald-400">
        </div>

        <button type="submit"
                class="w-full py-2 bg-emerald-500 hover:bg-emerald-600 font-semibold rounded transition duration-200">
            Sign In
        </button>
    </form>
</div>

</body>
</html>
